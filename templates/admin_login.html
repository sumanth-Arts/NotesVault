<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | NotesVault Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-login {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center h-screen overflow-hidden relative">

    <!-- Decorative Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full -z-10">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-sky-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-indigo-500/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-sm px-6">
        <div class="glass-login p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            
            <!-- Secure Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-sky-500/10 rounded-2xl mb-4 border border-sky-500/20">
                    <svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 class="text-white text-2xl font-bold tracking-tight">Admin <span class="text-sky-500">Access</span></h2>
                <!-- <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest font-semibold">Authorized Personnel Only</p> -->
            </div>

            <!-- Login Form -->
            <form method="POST" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Identity</label>
                    <input 
                        name="username" 
                        type="text" 
                        placeholder="Admin Username"
                        required
                        class="w-full p-4 rounded-2xl bg-slate-800/50 border border-slate-700 text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 transition-all"
                    >
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Access Key</label>
                    <input 
                        name="password" 
                        type="password" 
                        placeholder="••••••••"
                        required
                        class="w-full p-4 rounded-2xl bg-slate-800/50 border border-slate-700 text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 transition-all"
                    >
                </div>

                <button class="w-full bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl font-bold text-white shadow-lg shadow-sky-600/20 transform active:scale-95 transition-all mt-4">
                    Initialize Terminal
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="/" class="text-slate-500 hover:text-white text-xs font-bold uppercase tracking-widest transition">
                    ← Back to Vault
                </a>
            </div>
        </div>
        
        <!-- Footer Meta
        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-[0.2em]">
            &copy; 2026 NotesVault Security Protocol
        </p> -->
    </div>

</body>
</html>
