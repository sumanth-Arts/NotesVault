<!DOCTYPE html>
<html>
<head>
    <title>Edit Announcement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">

<h1 class="text-2xl font-bold mb-6">Edit Announcement</h1>

<form method="POST" class="space-y-4 max-w-xl">

    <input name="title" value="{{ announcement[0] }}"
        class="w-full p-3 bg-slate-800 rounded">

    <textarea name="message"
        class="w-full p-3 bg-slate-800 rounded">{{ announcement[1] }}</textarea>

    <button class="bg-green-600 px-6 py-3 rounded w-full">
        Update
    </button>

</form>

</body>
</html>
