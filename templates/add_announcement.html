<!DOCTYPE html>
<html>
<head>
    <title>Add Announcement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">

<form method="POST" class="bg-slate-800 p-8 rounded-2xl w-96 space-y-4">
    <h2 class="text-xl font-bold text-white">New Announcement</h2>

    <input name="title" placeholder="Title"
           class="w-full p-3 bg-slate-700 rounded text-white">

    <textarea name="message" placeholder="Message"
              class="w-full p-3 bg-slate-700 rounded text-white"></textarea>

    <button class="w-full bg-sky-600 p-3 rounded font-bold">
        Add
    </button>
</form>

</body>
</html>
