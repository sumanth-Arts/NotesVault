<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject_name }} | Learning Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .content-area {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        
        #mobileSidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>

<body class="h-screen flex flex-col">

    <nav class="h-16 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <!-- <a href="/semester/{{ semester_name }}" class="p-2 hover:bg-slate-800 rounded-lg transition text-slate-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a> -->
            <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-slate-800 text-slate-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
            <h2 class="font-bold text-lg tracking-tight">{{ subject_name }}</h2>
        </div>

        <div class="hidden sm:block text-xs font-bold text-sky-500 bg-sky-500/10 px-3 py-1 rounded-full uppercase tracking-widest">
            {{ semester_name }}
        </div>
    </nav>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden transition-opacity duration-300"></div>

    <div class="flex flex-1 overflow-hidden">
        <aside id="mobileSidebar" class="fixed md:relative top-0 left-0 h-full w-72 z-50 bg-slate-900 border-r border-slate-800 transform -translate-x-full md:translate-x-0 flex flex-col sidebar-scroll overflow-y-auto">
            <div class="p-4 border-b border-slate-800/50">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Course Curriculum</span>
            </div>

            <div class="flex-1 py-4 space-y-2">
                {% for unit in units %}
                <div class="px-3">
                    <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-slate-800/50 cursor-pointer transition-all mb-1"
                         onclick="handleNavClick('{{ unit }}', 'notes')">
                        <span class="text-sm font-semibold text-slate-300 group-hover:text-white">{{ unit }}</span>
                        <svg class="w-4 h-4 text-slate-600 group-hover:text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>

                    <div class="ml-4 space-y-1 border-l border-slate-800 pl-4 mb-4">
                        <button onclick="handleNavClick('{{ unit }}', 'notes')" class="w-full text-left py-1.5 text-xs text-slate-500 hover:text-sky-400 transition flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span> Notes
                        </button>
                        <button onclick="handleNavClick('{{ unit }}', 'ppt')" class="w-full text-left py-1.5 text-xs text-slate-500 hover:text-sky-400 transition flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span> Slides
                        </button>
                        <button onclick="handleNavClick('{{ unit }}', 'qb')" class="w-full text-left py-1.5 text-xs text-slate-500 hover:text-sky-400 transition flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span> QB
                        </button>
                        {% if subject_name == "Java" %}
                        <div onclick="loadResource('lab')">
                            <!-- Lab Programs -->
                        </div>
                        <button onclick="handleNavClick('{{ unit }}', 'lab')" class="w-full text-left py-1.5 text-xs text-slate-500 hover:text-sky-400 transition flex items-center gap-2">
                                            <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span> Lab Programs
                                        </button>
                        {% endif %}
                        
                    </div>
                </div>
                
                {% endfor %}
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto content-area p-6 md:p-12">
            <div id="notes-content" class="max-w-4xl mx-auto">
                <div class="h-[60vh] flex flex-col items-center justify-center text-center">
                    <div class="w-20 h-20 bg-slate-800 rounded-3xl flex items-center justify-center text-3xl mb-6 shadow-inner">📖</div>
                    <h2 class="text-2xl font-bold text-white mb-2">Ready to Learn?</h2>
                    <p class="text-slate-500 max-w-sm">Select a unit from the curriculum to begin studying.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("mobileSidebar");
            const overlay = document.getElementById("sidebarOverlay");
            sidebar.classList.toggle("-translate-x-full");
            overlay.classList.toggle("hidden");
        }

       
        function handleNavClick(unit, type) {
            if (window.innerWidth < 768) toggleSidebar();
            if (type === 'notes') loadUnit(unit);
            else loadResource(unit, type);
        }

        function loadUnit(unitName) {
            const content = document.getElementById("notes-content");
            content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-sky-500"></div></div>`;

            fetch(`/unit_content/${encodeURIComponent("{{ semester_name }}")}/${encodeURIComponent("{{ subject_name }}")}/${encodeURIComponent(unitName)}`)
                .then(r => r.text())
                .then(data => {
                    content.innerHTML = data;
                    
                    renderMathInElement(content, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false }
                        ],
                        throwOnError: false
                    });
                });
        }

        function loadResource(unitName, type) {
            const content = document.getElementById("notes-content");
            content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500"></div></div>`;
            fetch(`/resource/{{ semester_name }}/{{ subject_name }}/${unitName}/${type}`)
                .then(r => r.text())
                .then(data => { content.innerHTML = data; });
        }

     
        document.addEventListener("click", function (e) {
            const header = e.target.closest("[onclick^='toggleTopic']");
            if (!header) return;
            e.preventDefault();
            const parent = header.parentElement;
            const content = parent.querySelector(".hidden-content");
            const icon = header.querySelector(".toggle-icon");
            if (!content) return;

            if (content.classList.contains("hidden")) {
                content.classList.remove("hidden");
                content.style.display = "block";
                if (icon) icon.style.transform = "rotate(180deg)";
                parent.classList.add("ring-1", "ring-sky-500/30", "bg-slate-800/50");
            } else {
                content.classList.add("hidden");
                content.style.display = "none";
                if (icon) icon.style.transform = "rotate(0deg)";
                parent.classList.remove("ring-1", "ring-sky-500/30", "bg-slate-800/50");
            }
        });
    </script>
</body>
</html>
